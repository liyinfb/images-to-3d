version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://reconstructor:reconstructor@db:3306/reconstructor
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOCAL_AUTH=true
      - VITE_LOCAL_AUTH=true
      # OAuth vars (only needed if LOCAL_AUTH is not set)
      # - VITE_APP_ID=${VITE_APP_ID:-}
      # - OAUTH_SERVER_URL=${OAUTH_SERVER_URL:-}
      # - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL:-}
      - OWNER_OPEN_ID=${OWNER_OPEN_ID:-}
      - OWNER_NAME=${OWNER_NAME:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=reconstructor
      - MYSQL_USER=reconstructor
      - MYSQL_PASSWORD=reconstructor
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
